<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="utf-8">

        <style>
            ol > li:nth-of-type(1) {                                         /*Pierwszy element znaczników li, które są dziećmi ol*/
                color: pink;
            }
            ul > li:first-child {                                            /*Pierwsze dziecko ul, które ma znacznik li*/
                letter-spacing: 10px;}
            ul > li:last-child {font-size: 2em;}                             /*Ostatnie dziecko ul, które ma znacznik li*/
            li:last-of-type{text-decoration: line-through;}                  /*W każdym ul, czy ol ostatni element li*/
            li:nth-of-type(odd):hover{background-color: mediumaquamarine;} /*Elementy nieparzyste znaczników li, jak na nie najedziesz myszką*/
            li:nth-of-type(even):active {background-color: mediumorchid;}  /*Elementy parzyste znaczników li, jak klikniesz i przytrzymasz na nich myszkę*/
        </style>

    </head>


    <body>
        <ul>
            <li>wakacje</li>
            <li>wakacje2</li>
        </ul>

        <ol>
            <li>punkt 1</li>
            <li>punkt 2</li>
            <li>punkt 3</li>
            <li>punkt 4</li>
            <li>punkt 5</li>
            <li>punkt 6</li>
            <li>punkt 7</li>
        </ol>
    </body>
</html>


<!--
WAŻNE KOMENDY:

- HOVER:    Najechanie na napis
- ACTIVATE: Przytrzymanie napisu
- VISITED:  Linki, które się już odwiedziło
- LINK:     Linki, które jeszcze nie zostały odwiedzone (Przeciwieństwo VISITED)


- "znacznik":NTH-OF-TYPE(): W nawiasach podajesz jaki w kolejności znacznik go dotyczy
- "znacznik":FIRST-CHILD:   Pierwszy znacznik o nazwie "znacznik" go dotyczy
- "znacznik":LAST-CHILD:    Odwrotność FIRST-CHILD, czyli sotyczy go ostatni znacznik
- (ODD):                    Element nieparzysty
- (EVEN):                   Element parzysty

!NA PAMIĘĆ! ^^^^^^^^^^^^^

- justify-content: Wyrównuje elementy z atrybutem flex wzdłuż głownej osi.
- align-items:     Wyrównuje elementy z atrybutem flex wzdłuż osi poprzecznych.
- align-self:      Wyrównuje element z atrybutem flex wzdłuż osi poprzecznych nadpisując wartość właściwości align-items.
- order:           Określa kolejność elementów z atrybutem flex.
- flex-flow:       Skrócona wersja flex-direction i flex-wrap.
- align-content:   Wyrównuje wiersze wewnątrz kontenera z atrybutem flex w przypadku gdy na osiach poprzecznych jest dodatkowe miejsce.

!TO NIE WIEM CZY BĘDZIE! ^^^^^^^^^^^^^

-->
