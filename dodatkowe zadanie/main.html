<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zadanie dodatkowe</title>

    <link rel="stylesheet" href="styl.css">
</head>
<body>
    
    <header>
        <h1>FORUM HOBBYSTYCZNE</h1>
    </header>

    <nav>
        <br>
        <h3>FORMULARZ REJESTRACJI DO FORUM</h3>
        <br>

        <div>
            <p>Twoje dane</p><br>
            <input type="text" name="nick" maxlength="15" placeholder="Nick"/><br>
            <input type="text" name="hobby" maxlength="15" placeholder="Hobby"/><br>
            <input type="text" name="zawod" maxlength="15" placeholder="Zawód"/><br>
            <input type="radio" class="wybierz" name="plec">Kobieta
            <input type="radio" class="wybierz" name="plec">Mężczyzna <br>
            <hr>
            <p>Dane logowania</p><br>
            <input type="text" name="login" maxlength="15" placeholder="Login"/><br>
            <input type="password" name="password" maxlength="15" placeholder="Hasło"/><br><br>
            <label>
                <input type="checkbox" id="wielkosc_checkboxa" name="polityka_bezpieczenstwa">Zapoznałem się z
                <a href="polityka_bezpieczeństwa.png">Polityką Bezpieczaństwa</a>
            </label><br><br>
            <input type="reset" class="wielkosc_przyciskow" value="WYCZYŚĆ">
            <input type="submit" class="wielkosc_przyciskow" value="REJESTRUJ">
        </div>
    </nav>

    <section>
        <br>
        <h3>TEMATY NA FORUM</h3>
        <br>

        <div>
            <ul>
                <li>
                    Hodowla zwierząt

                    <br><br>
                    <ol id="bez_wypelnienia">
                        <li>psy</li>
                        <li>koty</li>
                    </ol>
                    <br>

                </li>
                <li>Muzyka</li>
                <li>Gry komputerowe</li>
            </ul>
        </div>
    </section>

</body>
</html>
