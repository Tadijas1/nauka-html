<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!--formularze - znaczniki i ich atrybuty-->
    <form name="formularz" action="" method="post"> <!--Zawiera ścieszkę do pliku obsługijącego formularza-->
        <!--Kontrolka wejścia-->
        <input type="text" id="imie" name="imie" maxlength="20" placeholder="Wpisz swoje imię"/><br/>

        <label for="wiek">Podaj wiek</label>
        <input type="number" id="wiek" name="wiek" min="1" max="18"/><br/>

        <label for="kolor">Wybierz kokor</label>
        <input type="color" id="kolor" name="kolor"/><br/.>

        <label for="data">Wybierz datę</label>
        <input type="date" name="data" id="data"/><br/>

        <input type="password" id="haslo" name="haslo" placeholder="wpisz swoje hasło"/><br/>

        <input type="file" id="plik" name="plik" placeholder="wybierz plik"/><br/>

        <input type="email" id="email" name="email" placeholder="wpisz swojego emaila"/><br/>

        <input type="range" id="ocena" min="0" max="10" step="2"/><br/>

        <!--Koniec inputów-->

        <label for="game">Wybierz grę: </label>
        <select id="game" multiple>
            <option value="no games" selected>nie gram w gry</option>
            <option value="helldivers 2">piekłonurki</option>
            <option value="minecraft">minecraft</option>
            <option value="red dead redempion 2">red dead redempion 2</option>
            <!--Atrybut logiczny taki atrybut, którego np. select="select", a jak napiszesz selected, to domyślnie zrobi to samo-->
        </select><br/><br/>


        <label for="filmy">Które z tych filmów znasz: </label>
        <select id="film" multiple>
            <optgroup label="akcji">
                <option value="SpiderMan">Człowiek pająk</option>
                <option value="IronMan">Człowiek żelazo</option>
            </optgroup>
            <optgroup label="komedie">
                <option value="Boy's don't cry">Chłopaki nie płaczą</option>
                <option value="Kiler">Kiler</option>

            </optgroup>
        </select><br/>

        <textarea placeholder="wpisz coś" rows="20" cols="20"></textarea><br/>

        <label>
            Czy masz gry na steam?
            <input type="radio" name="gra" value="tak">TAK
            <input type="radio" name="gra" value="nie">NIE
        </label><br/>

        <label>
            Czy masz gry takie na steam?
            <input type="checkbox" name="gra" value="helldivers2">piekłonurki
            <input type="checkbox" name="gra" value="minecraft">minecraft
            <input type="checkbox" name="gra" value="reddeadredempion2">red dead redempion 2
            <input type="checkbox" name="gra" value="cs2">cs2
        </label>

        <fieldset>
            <legend>Dane osobowe: </legend>
            <input type="imie" placeholder="wpisz imie"/>
                <input type="nazwisko" placeholder="wpisz nazwisko"/>
        </fieldset>

    </form>
</body>
</html>
